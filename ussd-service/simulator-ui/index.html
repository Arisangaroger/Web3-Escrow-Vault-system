<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escrow USSD Handset Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Fragment+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a211c;
      --ink-soft: #3d4a42;
      --paper: #e8efe6;
      --moss: #2f6b4f;
      --moss-deep: #1e4634;
      --clay: #c45c26;
      --lcd: #9bb57a;
      --lcd-dark: #1f2e18;
      --chassis: #2a2f2c;
      --chassis-edge: #141816;
      --bezel: #0d0f0e;
      --key: #3a4140;
      --key-text: #eef3ea;
      --danger: #b33a2b;
      --shadow: rgba(12, 18, 14, 0.45);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Bricolage Grotesque", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(47, 107, 79, 0.35), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 0%, rgba(196, 92, 38, 0.2), transparent 50%),
        linear-gradient(165deg, #c5d1c0 0%, #9eae9a 42%, #7d8f78 100%);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .lab {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 14px 28px;
    }

    .masthead {
      display: grid;
      gap: 4px;
      margin-bottom: 16px;
      animation: rise 0.7s var(--ease) both;
    }

    .masthead .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 700;
    }

    .masthead h1 {
      font-size: clamp(1.35rem, 2.8vw, 1.85rem);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
      max-width: 18ch;
    }

    .masthead .lede {
      max-width: 48ch;
      color: var(--ink-soft);
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .shortcode-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      padding: 5px 10px;
      width: fit-content;
      background: var(--ink);
      color: var(--paper);
      border-radius: 3px;
      font-family: "Fragment Mono", monospace;
      font-size: 0.8rem;
    }

    .shortcode-chip span {
      opacity: 0.55;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: "Bricolage Grotesque", sans-serif;
    }

    .bench {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 240px));
      gap: 14px;
      justify-content: center;
      align-items: start;
    }

    @media (max-width: 820px) {
      .bench {
        grid-template-columns: minmax(0, 260px);
        max-width: 280px;
        margin: 0 auto;
      }
    }

    .handset-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 240px;
      width: 100%;
      animation: rise 0.8s var(--ease) both;
    }

    .handset-wrap:nth-child(2) { animation-delay: 0.08s; }
    .handset-wrap:nth-child(3) { animation-delay: 0.16s; }

    .role-tag {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0 4px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .role-tag em {
      font-style: normal;
      font-family: "Fragment Mono", monospace;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      opacity: 0.7;
      font-size: 0.62rem;
    }

    .handset {
      background: linear-gradient(160deg, #3a403c 0%, var(--chassis) 35%, var(--chassis-edge) 100%);
      border-radius: 16px;
      padding: 10px 10px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 12px 24px var(--shadow),
        0 1px 0 #050606;
      position: relative;
      transition: transform 0.35s var(--ease);
    }

    .handset:focus-within {
      transform: translateY(-2px);
    }

    .speaker {
      width: 48px;
      height: 4px;
      margin: 2px auto 8px;
      border-radius: 99px;
      background: #0a0b0a;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.15);
    }

    .msisdn {
      display: grid;
      gap: 2px;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .msisdn label {
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(238, 243, 234, 0.55);
      font-weight: 700;
    }

    .msisdn input {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--key-text);
      font-family: "Fragment Mono", monospace;
      font-size: 0.78rem;
      padding: 5px 7px;
      border-radius: 5px;
      outline: none;
    }

    .msisdn input:focus {
      border-color: rgba(155, 181, 122, 0.7);
    }

    .lcd-shell {
      background: var(--bezel);
      border-radius: 8px;
      padding: 6px;
      margin-bottom: 8px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .lcd {
      background: linear-gradient(180deg, #b4cb94 0%, var(--lcd) 55%, #87a066 100%);
      color: var(--lcd-dark);
      border-radius: 3px;
      min-height: 108px;
      max-height: 132px;
      overflow-y: auto;
      padding: 6px 8px;
      font-family: "Fragment Mono", monospace;
      font-size: 11px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      box-shadow: inset 0 0 20px rgba(30, 50, 20, 0.18);
    }

    .lcd::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(20, 35, 15, 0.04) 2px,
        rgba(20, 35, 15, 0.04) 3px
      );
      pointer-events: none;
    }

    .lcd.empty { color: rgba(31, 46, 24, 0.45); }

    .lcd.flash { animation: lcdPulse 0.35s var(--ease); }

    .lcd-status {
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 4px;
      padding-bottom: 3px;
      border-bottom: 1px solid rgba(31, 46, 24, 0.2);
      color: rgba(31, 46, 24, 0.7);
    }

    .lcd-status.active { color: var(--moss-deep); }
    .lcd-status.ended { color: var(--danger); }
    .lcd-status.error { color: #7a2e18; }

    .soft-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-bottom: 7px;
    }

    .soft {
      border: none;
      cursor: pointer;
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700;
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 4px;
      border-radius: 4px;
      color: var(--key-text);
      transition: transform 0.12s var(--ease), filter 0.12s;
    }

    .soft:active { transform: scale(0.97); }
    .soft-dial { background: var(--moss); }
    .soft-send { background: #3d5c8a; }
    .soft-end { background: var(--danger); }
    .soft:hover { filter: brightness(1.08); }

    .digit-field {
      width: 100%;
      margin-bottom: 6px;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.4);
      color: #d7e4cf;
      font-family: "Fragment Mono", monospace;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      outline: none;
    }

    .digit-field::placeholder {
      color: rgba(215, 228, 207, 0.35);
      letter-spacing: 0;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .key {
      appearance: none;
      border: none;
      cursor: pointer;
      background: linear-gradient(180deg, #4a5250 0%, var(--key) 100%);
      color: var(--key-text);
      border-radius: 4px;
      height: 28px;
      aspect-ratio: auto;
      font-family: "Fragment Mono", monospace;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 2px 0 #101211;
      transition: transform 0.1s var(--ease), box-shadow 0.1s;
      display: grid;
      place-content: center;
      line-height: 1;
    }

    .key:active {
      transform: translateY(1px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 1px 0 #101211;
    }

    .mic {
      width: 28px;
      height: 3px;
      margin: 8px auto 0;
      border-radius: 99px;
      background: rgba(0,0,0,0.55);
    }

    .sms-panel {
      background: rgba(26, 33, 28, 0.88);
      color: var(--paper);
      border-radius: 8px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      max-height: 100px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sms-panel header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.7;
    }

    .sms-count {
      font-family: "Fragment Mono", monospace;
      opacity: 1;
      color: #b8d39a;
      letter-spacing: 0;
      text-transform: none;
      font-size: 0.68rem;
    }

    .sms-list {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 28px;
    }

    .sms-empty {
      font-size: 0.68rem;
      opacity: 0.45;
      font-family: "Fragment Mono", monospace;
    }

    .sms-item {
      background: rgba(255,255,255,0.06);
      border-left: 2px solid #b8d39a;
      padding: 4px 6px;
      border-radius: 0 4px 4px 0;
      font-size: 0.62rem;
      line-height: 1.3;
      animation: smsIn 0.35s var(--ease) both;
    }

    .sms-item time {
      display: block;
      margin-top: 2px;
      font-size: 0.55rem;
      opacity: 0.45;
      font-family: "Fragment Mono", monospace;
    }

    .dock {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      animation: rise 0.9s var(--ease) 0.2s both;
    }

    .add-btn {
      border: 1.5px dashed rgba(26, 33, 28, 0.35);
      background: rgba(232, 239, 230, 0.55);
      color: var(--ink);
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s var(--ease);
    }

    .add-btn:hover {
      background: var(--paper);
      border-color: var(--moss);
      transform: translateY(-1px);
    }

    .hint {
      text-align: center;
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--ink-soft);
      opacity: 0.85;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes lcdPulse {
      0% { filter: brightness(1); }
      40% { filter: brightness(1.15); }
      100% { filter: brightness(1); }
    }

    @keyframes smsIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="lab">
    <header class="masthead">
      <p class="eyebrow">Escrow Vault · Phase 3</p>
      <h1>USSD Handset Lab</h1>
      <p class="lede">
        Three feature phones on one bench. Dial the shortcode, tap the keypad,
        watch SMS land — same flow a farmer gets on a basic handset.
      </p>
      <div class="shortcode-chip">
        <span>Shortcode</span>
        *384*96#
      </div>
    </header>

    <div class="bench" id="phonesGrid"></div>

    <div class="dock">
      <button type="button" class="add-btn" onclick="addPhone()">Add another handset</button>
    </div>
    <p class="hint">Tip: use the on-screen keypad, then Send. Dial starts a new USSD session.</p>
  </div>

  <script>
    const USSD_API_URL = 'http://localhost:4000';
    const BACKEND_API_URL = 'http://localhost:3000';
    const SHORTCODE = '*384*96#';
    let phoneCount = 0;
    const phones = {};
    const smsPollers = {};
    const roles = ['Sender', 'Driver', 'Receiver'];

    window.onload = () => {
      addPhone('0788111111');
      addPhone('0788222222');
      addPhone('0788333333');
    };

    function generateSessionId() {
      return 'sim_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);
    }

    function keypadHtml(phoneId) {
      const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '*', '0', '#'];
      return keys.map((digit) => `
        <button type="button" class="key" onclick="pressKey('${phoneId}', '${digit}')">${digit}</button>
      `).join('');
    }

    function addPhone(defaultNumber = '') {
      phoneCount++;
      const phoneId = `phone${phoneCount}`;
      const role = roles[phoneCount - 1] || `Line ${phoneCount}`;

      const wrap = document.createElement('div');
      wrap.className = 'handset-wrap';
      wrap.id = phoneId;

      wrap.innerHTML = `
        <div class="role-tag">
          <span>${role}</span>
          <em>Handset ${phoneCount}</em>
        </div>
        <div class="handset">
          <div class="speaker" aria-hidden="true"></div>
          <div class="msisdn">
            <label for="${phoneId}-number">SIM number</label>
            <input type="text" id="${phoneId}-number" value="${defaultNumber}"
                   placeholder="0788123456" inputmode="tel" autocomplete="off">
          </div>
          <div class="lcd-shell">
            <div class="lcd empty" id="${phoneId}-screen">
              <div class="lcd-status" id="${phoneId}-status">Idle · ready to dial</div>
              <div id="${phoneId}-lcd-body">Dial ${SHORTCODE}</div>
            </div>
          </div>
          <div class="soft-row">
            <button type="button" class="soft soft-dial" onclick="dial('${phoneId}')">Dial</button>
            <button type="button" class="soft soft-send" onclick="sendInput('${phoneId}')">Send</button>
            <button type="button" class="soft soft-end" onclick="endSession('${phoneId}')">End</button>
          </div>
          <input type="text" class="digit-field" id="${phoneId}-input"
                 placeholder="Digits…" maxlength="24" inputmode="numeric" autocomplete="off">
          <div class="keypad">${keypadHtml(phoneId)}</div>
          <div class="mic" aria-hidden="true"></div>
        </div>
        <div class="sms-panel" id="${phoneId}-sms">
          <header>
            <span>SMS inbox</span>
            <span class="sms-count" id="${phoneId}-sms-count">0</span>
          </header>
          <div class="sms-list" id="${phoneId}-sms-messages">
            <div class="sms-empty">No messages yet</div>
          </div>
        </div>
      `;

      document.getElementById('phonesGrid').appendChild(wrap);

      phones[phoneId] = {
        sessionId: null,
        text: '',
        phoneNumber: defaultNumber,
      };

      if (defaultNumber) startSmsPolling(phoneId);
    }

    function pressKey(phoneId, digit) {
      const input = document.getElementById(`${phoneId}-input`);
      if (!input) return;
      if (input.value.length >= 24) return;
      input.value += digit;
      input.focus();
    }

    async function dial(phoneId) {
      const phoneNumber = document.getElementById(`${phoneId}-number`).value.trim();
      if (!phoneNumber) {
        updateStatus(phoneId, 'Enter a SIM number', 'error');
        return;
      }

      phones[phoneId].sessionId = generateSessionId();
      phones[phoneId].text = '';
      phones[phoneId].phoneNumber = phoneNumber;
      document.getElementById(`${phoneId}-input`).value = '';

      updateStatus(phoneId, 'Dialing shortcode…', 'active');

      try {
        const response = await fetch(`${USSD_API_URL}/ussd`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: phones[phoneId].sessionId,
            phoneNumber,
            text: '',
          }),
        });

        const message = await response.text();
        displayMessage(phoneId, message);

        if (message.startsWith('END')) {
          updateStatus(phoneId, 'Session ended', 'ended');
          phones[phoneId].sessionId = null;
        } else {
          updateStatus(phoneId, 'Session active', 'active');
        }

        startSmsPolling(phoneId);
      } catch (error) {
        console.error('Dial error:', error);
        updateStatus(phoneId, 'Network error', 'error');
        displayMessage(phoneId, 'END Network error. Is the USSD service on :4000?');
      }
    }

    async function sendInput(phoneId) {
      const input = document.getElementById(`${phoneId}-input`).value.trim();

      if (!phones[phoneId].sessionId) {
        updateStatus(phoneId, 'Dial first', 'error');
        return;
      }
      if (!input) {
        updateStatus(phoneId, 'Enter digits', 'error');
        return;
      }

      phones[phoneId].text = phones[phoneId].text
        ? `${phones[phoneId].text}*${input}`
        : input;

      updateStatus(phoneId, 'Sending…', 'active');

      try {
        const response = await fetch(`${USSD_API_URL}/ussd`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: phones[phoneId].sessionId,
            phoneNumber: phones[phoneId].phoneNumber,
            text: phones[phoneId].text,
          }),
        });

        const message = await response.text();
        displayMessage(phoneId, message);
        document.getElementById(`${phoneId}-input`).value = '';

        if (message.startsWith('END')) {
          updateStatus(phoneId, 'Session ended', 'ended');
          phones[phoneId].sessionId = null;
          phones[phoneId].text = '';
        } else {
          updateStatus(phoneId, 'Session active', 'active');
        }
      } catch (error) {
        console.error('Send error:', error);
        updateStatus(phoneId, 'Network error', 'error');
        displayMessage(phoneId, 'END Network error. Please try again.');
      }
    }

    function endSession(phoneId) {
      phones[phoneId].sessionId = null;
      phones[phoneId].text = '';
      document.getElementById(`${phoneId}-input`).value = '';
      updateStatus(phoneId, 'Idle · ready to dial', '');
      const screen = document.getElementById(`${phoneId}-screen`);
      const body = document.getElementById(`${phoneId}-lcd-body`);
      body.textContent = `Dial ${SHORTCODE}`;
      screen.classList.add('empty');
    }

    function displayMessage(phoneId, message) {
      const screen = document.getElementById(`${phoneId}-screen`);
      const body = document.getElementById(`${phoneId}-lcd-body`);
      const display = message.replace(/^(CON|END)\s/, '');
      body.textContent = display;
      screen.classList.remove('empty');
      screen.classList.remove('flash');
      void screen.offsetWidth;
      screen.classList.add('flash');
    }

    function updateStatus(phoneId, text, statusClass) {
      const status = document.getElementById(`${phoneId}-status`);
      status.textContent = text;
      status.className = 'lcd-status ' + (statusClass || '');
    }

    function startSmsPolling(phoneId) {
      if (smsPollers[phoneId]) return;
      smsPollers[phoneId] = setInterval(() => fetchSms(phoneId), 5000);
      fetchSms(phoneId);
    }

    async function fetchSms(phoneId) {
      const phoneNumber = phones[phoneId]?.phoneNumber
        || document.getElementById(`${phoneId}-number`)?.value.trim();
      if (!phoneNumber) return;
      phones[phoneId].phoneNumber = phoneNumber;

      try {
        const response = await fetch(
          `${BACKEND_API_URL}/users/${encodeURIComponent(phoneNumber)}/notifications`
        );
        const data = await response.json();
        if (data.success && data.data) displaySms(phoneId, data.data);
      } catch (_) {
        /* backend may be offline */
      }
    }

    function displaySms(phoneId, notifications) {
      const container = document.getElementById(`${phoneId}-sms-messages`);
      const countEl = document.getElementById(`${phoneId}-sms-count`);
      const list = notifications || [];
      countEl.textContent = String(list.length);

      if (list.length === 0) {
        container.innerHTML = '<div class="sms-empty">No messages yet</div>';
        return;
      }

      container.innerHTML = list.slice(0, 8).map((notif) => `
        <div class="sms-item">
          ${escapeHtml(notif.message)}
          <time>${new Date(notif.sentAt).toLocaleTimeString()}</time>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const el = document.activeElement;
      if (el && el.classList.contains('digit-field')) {
        const phoneId = el.id.replace('-input', '');
        sendInput(phoneId);
      }
    });
  </script>
</body>
</html>
